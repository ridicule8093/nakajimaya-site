<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<p class="row-label">Buttons · primary / secondary / two shapes</p>
<div style="display:flex;flex-direction:column;gap:14px;font-family:'Noto Sans JP',sans-serif">
  <div style="display:flex;gap:12px;align-items:center">
    <button style="background:#6b4a2f;color:#fff;border:1px solid #6b4a2f;border-radius:4px;padding:11px 22px;font-weight:700;font-size:14px;cursor:pointer">お問い合わせ</button>
    <button style="background:transparent;color:#4c3422;border:1px solid #6b4a2f;border-radius:4px;padding:11px 22px;font-weight:700;font-size:14px;cursor:pointer">取扱商品を見る</button>
    <span style="font-size:11px;color:#5c5650;font-family:var(--nks-font-latin);margin-left:6px">square · 推奨 (実務感)</span>
  </div>
  <div style="display:flex;gap:12px;align-items:center">
    <button style="background:#6b4a2f;color:#fff;border:1px solid #6b4a2f;border-radius:999px;padding:11px 22px;font-weight:700;font-size:14px;cursor:pointer">お問い合わせ</button>
    <button style="background:transparent;color:#4c3422;border:1px solid #6b4a2f;border-radius:999px;padding:11px 22px;font-weight:700;font-size:14px;cursor:pointer">取扱商品を見る</button>
    <span style="font-size:11px;color:#5c5650;font-family:var(--nks-font-latin);margin-left:6px">pill · 現行サイトの形 (やや柔らかい)</span>
  </div>
</div>
</body></html>
